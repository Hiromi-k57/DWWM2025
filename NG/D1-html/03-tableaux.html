<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balises de base pour les tableaux</title>
    <style>
        table, td, th
        {
            border: 2px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <!-- un tableau -->
    <table>
        <!-- une rangée d'un tableau -->
        <tr>
            <!-- une fase d"un tableau -->
             <td>pomme</td>
             <td>cerise</td>
        </tr>
        <tr>
            <td>banana</td>
            <td>anana</td>
        </tr>
    </table>
    <!-- tableau plus poussé -->
     <table>
        <!-- l'entête du tableau -->
         <thead>
            <tr>
                <!-- titre des colonnes -->
                 <th colspan="2">Fruit</th>
                 <th colspan="2">Légume</th>
            </tr>
         </thead>
         <!-- corps du tableau -->
          <tbody>
            <tr>
                <td>banana</td>
                <td>cerise</td>
                <td>carotte</td>
                <!-- fusionne des rangées -->
                 <td rowspan="2">tomate</td>
            </tr>
          </tbody>
          <!-- pied du tableau -->
           <tfoot>
            <tr>
                <td colspan="4">Mangez 5 fruits et légumes par jour</td>
            </tr>
           </tfoot>
     </table>
    
</body>
</html>
